<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteClass — Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--navy:#1A237E;--emerald:#00897B;--gray:#F5F6FA;--border:#E8EDF2;--text:#1C1C2E}
  body{font-family:'DM Sans',sans-serif;background:var(--gray);min-height:100vh}

  /* LOGIN */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
  .login-card{background:white;border-radius:20px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 4px 40px rgba(26,35,126,0.12)}
  .login-logo{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--navy);text-align:center;margin-bottom:8px}
  .login-logo span{color:var(--emerald)}
  .login-sub{text-align:center;font-size:.85rem;color:#888;margin-bottom:28px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
  .field input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
  .field input:focus{border-color:var(--navy)}
  .btn-login{width:100%;padding:13px;background:var(--navy);color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
  .btn-login:hover{background:#283593}
  .alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;background:#fdecea;color:#e53935;border:1px solid #f5c6cb}
  .alert.show{display:block}

  /* ADMIN */
  .admin-wrap{display:none}
  .topbar{background:var(--navy);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
  .topbar-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:white}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .topbar-right span{color:rgba(255,255,255,.6);font-size:.82rem}
  .btn-logout{background:rgba(255,255,255,.1);border:none;color:white;padding:7px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer}
  .btn-logout:hover{background:rgba(255,255,255,.2)}

  .content{padding:24px;max-width:1000px;margin:auto}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
  .stat-card{background:white;border-radius:14px;padding:20px;border:1px solid var(--border)}
  .stat-val{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--navy)}
  .stat-val.green{color:var(--emerald)}
  .stat-lbl{font-size:.78rem;color:#888;margin-top:4px}

  .section-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;color:var(--navy);margin-bottom:14px}
  .search-box{display:flex;align-items:center;gap:8px;background:white;border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;margin-bottom:16px;width:280px}
  .search-box input{border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:.88rem;width:100%}

  .table-wrap{background:white;border-radius:16px;border:1px solid var(--border);overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead th{background:var(--gray);padding:10px 14px;text-align:left;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#888;border-bottom:1px solid var(--border)}
  tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:#fafbff}
  tbody td{padding:12px 14px;font-size:.85rem}
  .user-name{font-weight:700;color:var(--navy)}
  .user-email{font-size:.78rem;color:#888}
  .plan-badge{display:inline-block;padding:3px 10px;border-radius:50px;font-size:.72rem;font-weight:700}
  .plan-free{background:rgba(96,125,139,.1);color:#607D8B}
  .plan-pro{background:rgba(0,137,123,.12);color:var(--emerald)}
  .btn-toggle{padding:6px 14px;border-radius:8px;font-size:.78rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all .2s}
  .btn-to-pro{background:var(--emerald);color:white}
  .btn-to-pro:hover{background:#00796B}
  .btn-to-free{background:rgba(244,67,54,.1);color:#e53935;border:1px solid rgba(244,67,54,.2)}
  .btn-to-free:hover{background:rgba(244,67,54,.2)}
  .date-cell{font-size:.75rem;color:#aaa}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:white;padding:12px 20px;border-radius:12px;font-size:14px;z-index:999;opacity:0;transform:translateY(12px);transition:all .3s;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(0)}
  .toast.success{background:var(--emerald)}
  .toast.error{background:#e53935}

  .empty{text-align:center;padding:40px;color:#aaa;font-size:.9rem}
  .loading{text-align:center;padding:40px;color:#aaa}
  .spin{display:inline-block;width:20px;height:20px;border:2px solid rgba(26,35,126,.2);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">Note<span>Class</span></div>
    <div class="login-sub">Espace Administration</div>
    <div class="alert" id="login-alert"></div>
    <div class="field">
      <label>Mot de passe admin</label>
      <input type="password" id="admin-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-login" onclick="login()">Accéder</button>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-wrap" id="admin-wrap">
  <div class="topbar">
    <div class="topbar-title">🛡️ NoteClass Admin</div>
    <div class="topbar-right">
      <span id="admin-date"></span>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="content">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="stat-total">—</div>
        <div class="stat-lbl">Utilisateurs total</div>
      </div>
      <div class="stat-card">
        <div class="stat-val green" id="stat-pro">—</div>
        <div class="stat-lbl">Comptes Pro</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-free">—</div>
        <div class="stat-lbl">Comptes Gratuits</div>
      </div>
    </div>

    <div class="section-title">Gestion des utilisateurs</div>
    <div class="search-box">
      <span>🔍</span>
      <input type="text" placeholder="Rechercher un utilisateur..." oninput="filterUsers(this.value)">
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Utilisateur</th>
            <th>Plan actuel</th>
            <th>Inscrit le</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="5" class="loading"><span class="spin"></span>Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API = 'https://noteclass-backend.onrender.com/api';
  const ADMIN_PWD = 'Kol@_Agency9119';
  const ADMIN_KEY = 'nc_admin_auth';

  // Vérifier si déjà connecté
  if (sessionStorage.getItem(ADMIN_KEY) === 'ok') showAdmin();

  function login() {
    const pwd = document.getElementById('admin-pwd').value;
    const alert = document.getElementById('login-alert');
    if (pwd !== ADMIN_PWD) {
      alert.textContent = 'Mot de passe incorrect.';
      alert.className = 'alert show';
      return;
    }
    sessionStorage.setItem(ADMIN_KEY, 'ok');
    showAdmin();
  }

  function logout() {
    sessionStorage.removeItem(ADMIN_KEY);
    location.reload();
  }

  function showAdmin() {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-wrap').style.display = 'block';
    document.getElementById('admin-date').textContent = new Date().toLocaleDateString('fr-FR', {weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    chargerUtilisateurs();
  }

  let allUsers = [];

  async function chargerUtilisateurs() {
    const token = localStorage.getItem('nc_token');
    if (!token) { document.getElementById('users-body').innerHTML = '<tr><td colspan="5" class="empty">Connectez-vous d\'abord sur NoteClass puis revenez ici.</td></tr>'; return; }

    try {
      const res = await fetch(`${API}/admin/users`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) throw new Error('Erreur API');
      allUsers = await res.json();
      afficherUsers(allUsers);
      document.getElementById('stat-total').textContent = allUsers.length;
      document.getElementById('stat-pro').textContent = allUsers.filter(u => u.plan === 'pro').length;
      document.getElementById('stat-free').textContent = allUsers.filter(u => u.plan === 'free').length;
    } catch(e) {
      document.getElementById('users-body').innerHTML = '<tr><td colspan="5" class="empty">Erreur de chargement. Vérifiez votre connexion.</td></tr>';
    }
  }

  function afficherUsers(users) {
    const tbody = document.getElementById('users-body');
    if (!users.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">Aucun utilisateur.</td></tr>'; return; }
    tbody.innerHTML = users.map((u, i) => `
      <tr>
        <td style="color:#aaa;font-size:.75rem">${i+1}</td>
        <td>
          <div class="user-name">${u.prenom || ''} ${u.nom || ''}</div>
          <div class="user-email">${u.email}</div>
        </td>
        <td><span class="plan-badge plan-${u.plan}">${u.plan === 'pro' ? '⭐ Pro' : 'Gratuit'}</span></td>
        <td class="date-cell">${new Date(u.created_at).toLocaleDateString('fr-FR')}</td>
        <td>
          ${u.plan === 'free'
            ? `<button class="btn-toggle btn-to-pro" onclick="changerPlan(${u.id},'pro')">⬆️ Passer Pro</button>`
            : `<button class="btn-toggle btn-to-free" onclick="changerPlan(${u.id},'free')">⬇️ Repasser Gratuit</button>`
          }
        </td>
      </tr>`).join('');
  }

  function filterUsers(q) {
    const filtered = allUsers.filter(u =>
      `${u.nom} ${u.prenom} ${u.email}`.toLowerCase().includes(q.toLowerCase())
    );
    afficherUsers(filtered);
  }

  async function changerPlan(userId, plan) {
    const token = localStorage.getItem('nc_token');
    const label = plan === 'pro' ? 'Pro' : 'Gratuit';
    if (!confirm(`Passer cet utilisateur en plan ${label} ?`)) return;

    try {
      const res = await fetch(`${API}/admin/users/${userId}/plan`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ plan })
      });
      if (!res.ok) throw new Error('Erreur');
      toast(`✅ Plan mis à jour : ${label}`, 'success');
      chargerUtilisateurs();
    } catch(e) {
      toast('❌ Erreur lors de la mise à jour', 'error');
    }
  }

  function toast(msg, type='success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    setTimeout(() => el.className = 'toast', 3000);
  }
</script>
</body>
</html>
