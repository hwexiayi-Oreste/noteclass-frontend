<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteClass — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bleu: #1A237E;
    --vert: #00897B;
    --blanc: #FFFFFF;
    --gris: #F5F6FA;
    --gris2: #E8EAF0;
    --texte: #1a1a2e;
    --erreur: #e53935;
    --succes: #00897B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gris);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #1A237E 0%, #283593 50%, #00897B 100%);
    opacity: 0.06;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 460px;
    padding: 16px;
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 56px;
    height: 56px;
    background: var(--bleu);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    box-shadow: 0 8px 24px rgba(26,35,126,0.3);
  }
  .logo-icon svg { width: 30px; height: 30px; fill: white; }
  .logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--bleu);
    letter-spacing: -0.5px;
  }
  .logo p { font-size: 14px; color: #666; margin-top: 4px; }

  .card {
    background: white;
    border-radius: 20px;
    padding: 36px 32px;
    box-shadow: 0 4px 40px rgba(26,35,126,0.1);
  }

  .tabs {
    display: flex;
    background: var(--gris);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #888;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: white;
    color: var(--bleu);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .form { display: none; }
  .form.active { display: block; }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--texte);
    margin-bottom: 6px;
  }
  .input-wrap { position: relative; }
  .input-wrap input, .field input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--gris2);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--texte);
    outline: none;
    transition: border-color 0.2s;
    background: white;
  }
  .input-wrap input:focus, .field input:focus { border-color: var(--bleu); }

  .eye-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #aaa;
    display: flex;
    align-items: center;
    padding: 4px;
  }
  .eye-btn:hover { color: var(--bleu); }

  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--bleu);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-primary:hover { background: #283593; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(26,35,126,0.3); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-google {
    width: 100%;
    padding: 12px;
    background: white;
    color: var(--texte);
    border: 2px solid var(--gris2);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 12px;
  }
  .btn-google:hover { border-color: var(--bleu); background: var(--gris); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: #bbb;
    font-size: 13px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gris2);
  }

  .alert {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .alert.show { display: block; }
  .alert.error { background: #fdecea; color: var(--erreur); border: 1px solid #f5c6cb; }
  .alert.success { background: #e8f5e9; color: var(--succes); border: 1px solid #c8e6c9; }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .row2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
    </div>
    <h1>NoteClass</h1>
    <p>Gestion des notes scolaires</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Se connecter</button>
      <button class="tab" onclick="switchTab('register')">Créer un compte</button>
    </div>

    <div class="alert" id="alert"></div>

    <!-- CONNEXION -->
    <form class="form active" id="form-login" onsubmit="handleLogin(event)">
      <div class="field">
        <label>Adresse email</label>
        <div class="input-wrap">
          <input type="email" id="login-email" placeholder="prof@ecole.bj" required>
        </div>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="login-password" placeholder="••••••••" required>
          <button type="button" class="eye-btn" onclick="togglePwd('login-password', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="btn-login">Se connecter</button>
      <div class="divider">ou</div>
      <button type="button" class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuer avec Google
      </button>
    </form>

    <!-- INSCRIPTION -->
    <form class="form" id="form-register" onsubmit="handleRegister(event)">
      <div class="row2">
        <div class="field">
          <label>Prénom</label>
          <input type="text" id="reg-prenom" placeholder="Jean" required>
        </div>
        <div class="field">
          <label>Nom</label>
          <input type="text" id="reg-nom" placeholder="ADOKOU" required>
        </div>
      </div>
      <div class="field">
        <label>Adresse email</label>
        <input type="email" id="reg-email" placeholder="prof@ecole.bj" required>
      </div>
      <div class="field">
        <label>Téléphone <span style="color:#aaa;font-weight:300">(optionnel)</span></label>
        <input type="tel" id="reg-tel" placeholder="+229 97 00 00 00">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="reg-password" placeholder="Minimum 6 caractères" required minlength="6">
          <button type="button" class="eye-btn" onclick="togglePwd('reg-password', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label>Confirmer le mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="reg-confirm" placeholder="••••••••" required>
          <button type="button" class="eye-btn" onclick="togglePwd('reg-confirm', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="btn-register">Créer mon compte</button>
      <div class="divider">ou</div>
      <button type="button" class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuer avec Google
      </button>
    </form>
  </div>
</div>

<script>
  const API = 'https://noteclass-backend.onrender.com/api';

  // Déjà connecté ?
  if (localStorage.getItem('nc_token')) window.location.href = 'noteclass-dashboard.html';

  // Token Google depuis URL
  const urlParams = new URLSearchParams(window.location.search);
  const tokenFromUrl = urlParams.get('token');
  if (tokenFromUrl) {
    localStorage.setItem('nc_token', tokenFromUrl);
    window.location.href = 'noteclass-dashboard.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register'));
    });
    document.getElementById('form-login').classList.toggle('active', tab==='login');
    document.getElementById('form-register').classList.toggle('active', tab==='register');
    hideAlert();
  }

  function showAlert(msg, type='error') {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert show ${type}`;
  }
  function hideAlert() { document.getElementById('alert').className = 'alert'; }

  function togglePwd(id, btn) {
    const input = document.getElementById(id);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.innerHTML = isText
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<span class="spinner"></span> Chargement...`
      : (btnId==='btn-login' ? 'Se connecter' : 'Créer mon compte');
  }

  async function handleLogin(e) {
    e.preventDefault();
    hideAlert();
    setLoading('btn-login', true);
    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('login-email').value.trim(),
          password: document.getElementById('login-password').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erreur de connexion.');
      localStorage.setItem('nc_token', data.token);
      localStorage.setItem('nc_user', JSON.stringify(data.user));
      showAlert('Connexion réussie ! Redirection...', 'success');
      setTimeout(() => window.location.href = 'noteclass-dashboard.html', 800);
    } catch (err) {
      showAlert(err.message);
      setLoading('btn-login', false);
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    hideAlert();
    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;
    if (password !== confirm) return showAlert('Les mots de passe ne correspondent pas.');
    setLoading('btn-register', true);
    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nom:       document.getElementById('reg-nom').value.trim(),
          prenom:    document.getElementById('reg-prenom').value.trim(),
          email:     document.getElementById('reg-email').value.trim(),
          telephone: document.getElementById('reg-tel').value.trim(),
          password
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erreur lors de la création du compte.');
      localStorage.setItem('nc_token', data.token);
      localStorage.setItem('nc_user', JSON.stringify(data.user));
      showAlert('Compte créé ! Redirection...', 'success');
      setTimeout(() => window.location.href = 'noteclass-dashboard.html', 800);
    } catch (err) {
      showAlert(err.message);
      setLoading('btn-register', false);
    }
  }

  function loginGoogle() {
    window.location.href = `${API}/auth/google`;
  }
</script>
</body>
</html>
